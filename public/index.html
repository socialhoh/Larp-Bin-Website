<!DOCTYPE html>
<html>
<head>
<title>Larp Bin</title>
<style>
body { background:#0a0a0f; color:white; font-family:monospace; }
header { display:flex; justify-content:space-between; padding:10px; background:#111; }

.post { background:#111; padding:10px; margin:10px; border:1px solid #222; }
img { width:30px; height:30px; border-radius:50%; }
</style>
</head>

<body>

<header>
  <div>LARP BIN</div>
  <button onclick="loadNotifications()">🔔</button>
</header>

<input id="user" placeholder="user">
<input id="pass" placeholder="pass">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<br><br>

<input id="postText" placeholder="post">
<button onclick="post()">Post</button>

<div id="feed"></div>
<div id="noti"></div>

<script>
let token = "";

/* AUTH */
async function register(){
  let r = await fetch("/api/register",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});
  let d = await r.json();
  token = d.token;
}

async function login(){
  let r = await fetch("/api/login",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user.value,password:pass.value})});
  let d = await r.json();
  token = d.token;
}

/* POST */
async function post(){
  await fetch("/api/post",{method:"POST",headers:{'Content-Type':'application/json','Authorization':token},body:JSON.stringify({text:postText.value})});
  loadPosts();
}

async function loadPosts(){
  let r = await fetch("/api/posts");
  let d = await r.json();

  feed.innerHTML="";
  d.forEach(p=>{
    feed.innerHTML+=`
      <div class="post">
        <b>${p.username}</b>
        <p>${p.text}</p>
        ❤️ ${p.likes}
        <button onclick="like('${p._id}','${p.username}')">Like</button>
      </div>
    `;
  });
}

/* LIKE */
async function like(id,owner){
  await fetch("/api/like",{method:"POST",headers:{'Content-Type':'application/json','Authorization':token},body:JSON.stringify({id,owner})});
  loadPosts();
}

/* NOTIFICATIONS */
async function loadNotifications(){
  let r = await fetch("/api/notifications",{headers:{'Authorization':token}});
  let d = await r.json();

  noti.innerHTML="";
  d.forEach(n=>{
    noti.innerHTML+=`<div>${n.text}</div>`;
  });
}

loadPosts();
</script>

</body>
</html>
