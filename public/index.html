<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* TOP BAR */
.topbar {
    background: #0b0b0b;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
}

.topbar h2 {
    margin: 0;
}

/* BUTTONS */
.topbar button {
    background: #333;
    border: none;
    color: white;
    padding: 6px 10px;
    margin-left: 5px;
    cursor: pointer;
}

/* MAIN */
.container {
    width: 80%;
    margin: auto;
    padding-top: 10px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    border: none;
    color: white;
    box-sizing: border-box;
}

button {
    background: #333;
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
}

/* POSTS */
.post {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 10px;
    cursor: pointer;
}

.post small {
    color: #aaa;
}

.post:hover {
    background: #222;
}

/* FULLSCREEN VIEW */
.fullscreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: auto;
    padding: 20px;
    z-index: 999;
    white-space: pre-wrap;
}

/* LOGIN MODAL */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    z-index:999;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.modal input {
    width: 300px;
    margin: 5px;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>Larp Bin</h2>
    <div>
        <button onclick="openLogin()">Login / Sign Up</button>
        <button onclick="openPanel()">Panel</button>
    </div>
</div>

<div class="container">

<h3>Create Post</h3>

<input id="title" placeholder="title">
<input id="author" placeholder="author (optional)">
<textarea id="content" placeholder="Shift + Enter = new line"></textarea>

<button onclick="createPost()">Post</button>

<div id="posts"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
    <h2>Login / Sign Up</h2>

    <input id="email" placeholder="email">
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">

    <button onclick="register()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <button onclick="closeLogin()">Close</button>
</div>

<!-- FULLSCREEN POST -->
<div id="full" class="fullscreen" onclick="this.style.display='none'"></div>

<script>

let user = null;

/* SHIFT + ENTER */
document.getElementById("content").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        createPost();
    }
});

/* LOGIN UI */
function openLogin() {
    loginModal.style.display = "flex";
}
function closeLogin() {
    loginModal.style.display = "none";
}

/* REGISTER */
async function register() {
    const res = await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value,
            username: username.value
        })
    });

    const data = await res.json();
    msg.innerText = data.success ? "Account created!" : data.error;
}

/* LOGIN */
async function login() {
    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value,
            username: username.value
        })
    });

    const data = await res.json();

    if (data.user) {
        user = data.user;
        msg.innerText = "Successfully logged in!";
    } else {
        msg.innerText = "Login failed";
    }
}

/* POSTS */
async function loadPosts() {
    const res = await fetch("/api/posts");
    const data = await res.json();

    const box = document.getElementById("posts");
    box.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.title}</b><br>
            <small>by ${p.author}</small><br>
            <p>${p.content.slice(0, 200)}...</p>
            <button onclick="openPost(${p.id})">Expand</button>
        `;

        box.appendChild(div);
    });
}

/* CREATE POST */
async function createPost() {
    await fetch("/api/posts", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            title: title.value,
            content: content.value,
            author: user?.username || author.value
        })
    });

    content.value = "";
    loadPosts();
}

/* EXPAND POST */
async function openPost(id) {
    const res = await fetch("/api/posts");
    const posts = await res.json();
    const post = posts.find(p => p.id === id);

    full.innerText =
`${post.title}

by ${post.author}

${post.content}`;

    full.style.display = "block";
}

/* PANEL (simple admin check UI hook) */
function openPanel() {
    if (!user?.isAdmin) {
        alert("Admin only");
        return;
    }

    alert("Admin panel (backend ready)");
}

loadPosts();

</script>

</body>
</html>
