<!DOCTYPE html>
<html>
<head>
<title>LARP BIN</title>

<style>
body { margin:0; background:#050505; color:#0f0; font-family:monospace; }

/* SCREEN 1 */
#start {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

button {
  background:black;
  color:#0f0;
  border:1px solid #0f0;
  padding:10px;
  cursor:pointer;
}

/* MAIN GRID */
#main { display:none; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.box {
  border:1px solid #0f0;
  padding:10px;
  height:300px;
  overflow:auto;
}

</style>
</head>

<body>

<!-- START SCREEN -->
<div id="start">
  <h1>LARP BIN</h1>
  <button onclick="enter()">CONTINUE</button>
</div>

<!-- MAIN -->
<div id="main">

<button onclick="codeLogin()">Login With Code</button>

<div class="grid">

<!-- ANNOUNCEMENTS -->
<div class="box">
  <h3>Announcements</h3>
  <textarea id="annText"></textarea><br>
  <input id="annImg" placeholder="img url"><br>
  <button onclick="postAnn()">Post</button>
  <div id="annList"></div>
</div>

<!-- POSTS -->
<div class="box">
  <h3>Posts</h3>

  <input id="search" placeholder="search">
  <button onclick="search()">Search</button>

  <div id="posts"></div>

  <h4>Create Post</h4>
  <input id="title" placeholder="title"><br>
  <textarea id="t1"></textarea><br>
  <textarea id="t2"></textarea><br>
  <textarea id="t3"></textarea><br>
  <input id="img" placeholder="img url"><br>

  <button onclick="createPost()">POST</button>
</div>

</div>

</div>

<script>
let user = "guest";
let role = "user";

/* ENTER */
function enter(){
  start.style.display="none";
  main.style.display="block";
  loadPosts();
  loadAnn();
}

/* OWNER LOGIN */
async function codeLogin(){
  let r = await fetch("/api/code-login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:prompt("Enter code")})
  });

  let d = await r.json();
  if(d.error) return alert("bad code");

  user = d.username;
  role = d.role;

  alert("Logged in as OWNER");
}

/* POSTS */
async function createPost(){
  await fetch("/api/post",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:user,
      title:title.value,
      text1:t1.value,
      text2:t2.value,
      text3:t3.value,
      img:img.value
    })
  });

  loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){
  let r = await fetch("/api/posts");
  let d = await r.json();

  posts.innerHTML="";
  d.forEach(p=>{
    posts.innerHTML+=`
      <div onclick="profile('${p.username}')">
        <b>${p.title}</b><br>
        by ${p.username}<br>
        ${p.text1}<br>
        ${p.text2}<br>
        ${p.text3}<br>
        <img src="${p.img}" width="100"><hr>
      </div>
    `;
  });
}

/* SEARCH */
async function search(){
  let r = await fetch("/api/search?q="+search.value);
  let d = await r.json();

  posts.innerHTML="";
  d.forEach(p=>{
    posts.innerHTML+=`<div>${p.title} - ${p.username}</div>`;
  });
}

/* PROFILE */
function profile(name){
  if(role === "owner"){
    if(confirm("Make staff?")){
      fetch("/api/staff",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user:name})
      });
    }
  }

  let newName = prompt("change name?");
  let pfp = prompt("pfp url?");

  fetch("/api/profile",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      old:name,
      new:newName,
      pfp
    })
  });
}

/* ANNOUNCEMENTS */
async function postAnn(){
  await fetch("/api/announce",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      text:annText.value,
      img:annImg.value
    })
  });

  loadAnn();
}

async function loadAnn(){
  let r = await fetch("/api/announce");
  let d = await r.json();

  annList.innerHTML="";
  d.forEach(a=>{
    annList.innerHTML+=`
      <div>${a.text}<br>
      <img src="${a.img}" width="100"></div>
    `;
  });
}
</script>

</body>
</html>
