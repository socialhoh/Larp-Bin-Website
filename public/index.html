<!DOCTYPE html>
<html>
<head>
<title>Larp Chat</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body { margin:0; display:flex; background:#0a0a0f; color:white; font-family:Arial; }

/* SIDEBAR */
.sidebar { width:200px; background:#111; padding:10px; }
.user { cursor:pointer; padding:5px; }
.online { color:lime; }

/* CHAT */
.chat { flex:1; display:flex; flex-direction:column; }
.messages { flex:1; padding:10px; }
.typing { font-size:12px; color:gray; }
</style>
</head>

<body>

<div class="sidebar">
  <h3>Users</h3>
  <div id="users"></div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="typing" id="typing"></div>

  <input id="msgBox" placeholder="message">
</div>

<script>
let socket = io();
let currentUser = "";
let currentChat = "";

/* LOGIN QUICK */
let name = prompt("Enter username");
currentUser = name;

socket.emit("login", name);

/* ONLINE USERS */
socket.on("onlineUsers", (list)=>{
  users.innerHTML="";
  list.forEach(u=>{
    if(u !== currentUser){
      users.innerHTML += `
        <div class="user online" onclick="openChat('${u}')">${u}</div>
      `;
    }
  });
});

/* OPEN CHAT */
function openChat(user){
  currentChat = user;
  messages.innerHTML="";
}

/* SEND MESSAGE */
msgBox.addEventListener("keypress", (e)=>{
  if(e.key === "Enter"){
    socket.emit("sendMessage", {
      from: currentUser,
      to: currentChat,
      text: msgBox.value
    });

    msgBox.value="";
  }

  socket.emit("typing", {
    from: currentUser,
    to: currentChat
  });
});

/* RECEIVE MESSAGE */
socket.on("receiveMessage", (data)=>{
  if(data.from === currentChat || data.to === currentChat){
    messages.innerHTML += `<div>${data.from}: ${data.text}</div>`;
  }
});

/* TYPING */
socket.on("typing", (user)=>{
  typing.innerText = user + " is typing...";
  setTimeout(()=> typing.innerText="", 1000);
});
</script>

</body>
</html>
