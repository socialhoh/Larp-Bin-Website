<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

.topbar {
    background: #0b0b0b;
    text-align: center;
    padding: 10px;
    border-bottom: 1px solid #222;
}

.container {
    width: 80%;
    margin: auto;
    padding-top: 10px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    border: none;
    color: white;
}

button {
    background: #333;
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
}

.post {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 10px;
    cursor: pointer;
}

.fullscreen {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    padding: 20px;
    overflow: auto;
    white-space: pre-wrap;
    z-index: 999;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Larp Bin</h2>
</div>

<div class="container">

<h3>Login</h3>
<input id="u" placeholder="username">
<input id="p" type="password" placeholder="password">
<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h3>Create Post</h3>
<input id="title" placeholder="title">
<textarea id="content"></textarea>
<button onclick="createPost()">Post</button>

<input id="search" placeholder="search..." oninput="loadPosts()">

<div id="posts"></div>

</div>

<div id="full" class="fullscreen" onclick="this.style.display='none'"></div>

<script>
let user = null;

/* AUTH */
async function register() {
    await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: u.value,
            password: p.value
        })
    });
}

async function login() {
    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: u.value,
            password: p.value
        })
    });

    const data = await res.json();
    if (data.user) user = data.user;
}

/* POSTS */
async function loadPosts() {
    const search = search.value;

    const res = await fetch("/api/posts?search=" + search);
    const data = await res.json();

    const box = document.getElementById("posts");
    box.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.title}</b><br>
            <small>${p.authorName}</small><br>
            <button onclick="openPost(${p.id})">Expand</button>
        `;

        box.appendChild(div);
    });
}

/* CREATE */
async function createPost() {
    await fetch("/api/posts", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            title: title.value,
            content: content.value,
            authorId: user?.id,
            authorName: user?.username
        })
    });

    loadPosts();
}

/* FULLSCREEN */
async function openPost(id) {
    const res = await fetch("/api/posts");
    const posts = await res.json();

    const post = posts.find(p => p.id === id);

    const c = await fetch("/api/comments/" + id);
    const comments = await c.json();

    let html = `${post.title}\n\n${post.content}\n\nCOMMENTS:\n`;

    comments.forEach(x => {
        html += `- ${x.user}: ${x.text}\n`;
    });

    html += `\nAdd comment below (refresh not included UI for simplicity)`;

    full.innerText = html;
    full.style.display = "block";
}

loadPosts();
</script>

</body>
</html>
