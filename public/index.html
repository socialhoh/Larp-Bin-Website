<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.topbar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#0b0b0b;
}

button { background:#333; color:white; border:none; padding:6px; cursor:pointer; }

.container { width:80%; margin:auto; }

input, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
    background:#222;
    color:white;
    border:none;
}

.post {
    background:#1a1a1a;
    padding:10px;
    margin:10px 0;
}

.modal, .panel {
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    top:0;
    left:0;
    padding:20px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Larp Bin</h2>
    <div>
        <button onclick="loginModal.style.display='block'">Login</button>
        <button onclick="openPanel()">Panel</button>
    </div>
</div>

<div class="container">

<h2>POSTS</h2>

<input id="title" placeholder="title">
<input id="author" placeholder="author">
<textarea id="content"></textarea>
<button onclick="createPost()">Post</button>

<div id="posts"></div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <h2>Login</h2>
    <input id="email">
    <input id="username">
    <input id="password" type="password">
    <button onclick="login()">Login</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
    <h2>Admin Panel</h2>
    <div id="panelData"></div>
    <button onclick="panel.style.display='none'">Close</button>
</div>

<script>

let user=null;

/* LOAD POSTS */
async function loadPosts(){
    const res = await fetch("/api/posts");
    const data = await res.json();

    posts.innerHTML="";

    data.forEach(p=>{
        const div=document.createElement("div");
        div.className="post";

        div.innerHTML=`
        <b>${p.title}</b><br>
        ${p.author} ${p.authorVerified ? "✔️ Verified" : ""}<br>
        <p>${p.content}</p>
        `;

        if(user?.isAdmin){
            div.innerHTML += `
                <button onclick="deletePost('${p._id}')">Delete</button>
            `;
        }

        posts.appendChild(div);
    });
}

/* CREATE POST */
async function createPost(){
    await fetch("/api/posts",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:title.value,
            content:content.value,
            author:author.value
        })
    });

    loadPosts();
}

/* LOGIN */
async function login(){
    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            username:username.value,
            password:password.value
        })
    });

    user = await res.json();
}

/* DELETE */
async function deletePost(id){
    await fetch("/api/admin/post/"+id,{method:"DELETE"});
    loadPosts();
}

/* PANEL */
async function openPanel(){
    if(!user?.isAdmin) return alert("Admin only");

    panel.style.display="block";

    const res = await fetch("/api/admin/dashboard");
    const data = await res.json();

    panelData.innerHTML = `
    USERS:<br>
    ${data.users.map(u=>u.username).join("<br>")}

    <br><br>POSTS:<br>
    ${data.posts.map(p=>p.title).join("<br>")}
    `;
}

loadPosts();

</script>

</body>
</html>
