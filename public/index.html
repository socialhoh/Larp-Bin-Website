<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* Top header */
.topbar {
    background: #0b0b0b;
    border-bottom: 1px solid #222;
    text-align: center;
    padding: 10px;
}

.topbar h1 {
    margin: 0;
    font-size: 22px;
}

.topbar p {
    margin: 4px 0 0;
    font-size: 11px;
    color: #888;
}

/* Layout */
.container {
    width: 80%;
    margin: auto;
    padding-top: 15px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    border: none;
    color: white;
}

button {
    padding: 8px 12px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

.post {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 10px;
}
</style>
</head>

<body>

<!-- TOP BAR (credits) -->
<div class="topbar">
    <h1>Larp Bin</h1>
    <p>Owner / Creator: pwned</p>
</div>

<div class="container">

<h2>Create Post</h2>

<input id="title" placeholder="Title">
<input id="author" placeholder="Author (optional)">
<textarea id="content" placeholder="Content"></textarea>

<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

</div>

<script>
async function loadPosts() {
    const res = await fetch('/api/posts');
    const data = await res.json();

    const container = document.getElementById('posts');
    container.innerHTML = '';

    data.forEach(post => {
        container.innerHTML += `
            <div class="post">
                <h3>${post.title}</h3>
                <small>by ${post.author} | ${new Date(post.createdAt).toLocaleString()}</small>
                <p>${post.content}</p>
                <button onclick="deletePost(${post.id})">Delete</button>
            </div>
        `;
    });
}

async function createPost() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const author = document.getElementById('author').value;

    await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, author })
    });

    document.getElementById('title').value = '';
    document.getElementById('content').value = '';

    loadPosts();
}

async function deletePost(id) {
    await fetch('/api/posts/' + id, { method: 'DELETE' });
    loadPosts();
}

loadPosts();
</script>

</body>
</html>
