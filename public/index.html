<!DOCTYPE html>
<html>
<head>
  <title>Larp Bin</title>
  <style>
    body {
      margin: 0;
      background: #0a0a0f;
      color: #e6e6e6;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    /* TOP BAR */
    header {
      background: #11111a;
      border-bottom: 1px solid #1f1f2a;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      letter-spacing: 2px;
      color: #7c5cff;
    }

    .tag {
      font-size: 12px;
      color: #888;
    }

    /* MAIN LAYOUT */
    .container {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 15px;
    }

    /* INPUT BOX */
    .panel {
      background: #12121a;
      border: 1px solid #222235;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      background: #0d0d14;
      border: 1px solid #2a2a3d;
      color: white;
      border-radius: 6px;
      outline: none;
    }

    button {
      background: #7c5cff;
      border: none;
      padding: 10px 12px;
      margin-top: 8px;
      color: white;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    button:hover {
      background: #6a4df0;
    }

    /* POSTS */
    .post {
      background: #12121a;
      border: 1px solid #1f1f2f;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .username {
      color: #7c5cff;
      font-weight: bold;
      font-size: 14px;
    }

    .text {
      margin-top: 5px;
      color: #ddd;
    }

    .meta {
      font-size: 11px;
      color: #777;
      margin-top: 8px;
    }

    /* subtle glow effect */
    .post:hover {
      border-color: #333355;
      box-shadow: 0 0 10px rgba(124,92,255,0.15);
    }
  </style>
</head>

<body>

<header>
  <div class="logo">LARP BIN</div>
  <div class="tag">anonymous feed system</div>
</header>

<div class="container">

  <div class="panel">
    <h3>Account</h3>
    <input id="user" placeholder="username">
    <input id="pass" placeholder="password">
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
  </div>

  <div class="panel">
    <h3>Create Post</h3>
    <input id="postText" placeholder="write something...">
    <button onclick="post()">Post</button>
  </div>

  <div id="feed"></div>

</div>

<script>
async function register(){
  await fetch("/api/register", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });
}

async function login(){
  await fetch("/api/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username:user.value,
      password:pass.value
    })
  });
  loadPosts();
}

async function post(){
  await fetch("/api/post", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username:user.value,
      text:postText.value
    })
  });
  loadPosts();
}

async function loadPosts(){
  let res = await fetch("/api/posts");
  let data = await res.json();

  feed.innerHTML = "";
  data.forEach(p => {
    feed.innerHTML += `
      <div class="post">
        <div class="username">${p.username}</div>
        <div class="text">${p.text}</div>
        <div class="meta">${new Date(p.createdAt).toLocaleString()}</div>
      </div>
    `;
  });
}

loadPosts();
</script>

</body>
</html>
