<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.topbar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#0b0b0b;
    border-bottom:1px solid #222;
}

button { background:#333; color:white; border:none; padding:6px 10px; cursor:pointer; }

.container { width:80%; margin:auto; padding-top:10px; }

input, textarea {
    width:100%;
    margin:5px 0;
    padding:8px;
    background:#222;
    border:none;
    color:white;
}

.post {
    background:#1a1a1a;
    padding:10px;
    margin:10px 0;
}

.modal, .panel, .full {
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background:black;
    z-index:999;
    padding:20px;
    overflow:auto;
}

pre { white-space:pre-wrap; }
</style>
</head>

<body>

<div class="topbar">
    <h2>Larp Bin</h2>
    <div>
        <button onclick="openLogin()">Login</button>
        <button onclick="openPanel()">Panel</button>
    </div>
</div>

<div class="container">

<h3>Create Post</h3>

<input id="title" placeholder="title">
<input id="author" placeholder="author (optional)">
<textarea id="content"></textarea>

<button onclick="createPost()">Post</button>

<div id="posts"></div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <h2>Login / Sign Up</h2>

    <input id="email" placeholder="email">
    <input id="username" placeholder="username">
    <input id="password" type="password" placeholder="password">

    <button onclick="register()">Sign Up</button>
    <button onclick="login()">Login</button>

    <p id="msg"></p>

    <button onclick="loginModal.style.display='none'">Close</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
    <h2>Admin Panel</h2>
    <pre id="panelData"></pre>
    <button onclick="panel.style.display='none'">Close</button>
</div>

<!-- FULL VIEW -->
<div id="full" class="full" onclick="this.style.display='none'"></div>

<script>

let user = null;

/* LOGIN UI */
function openLogin(){
    loginModal.style.display="block";
}

/* REGISTER */
async function register(){
    await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            password:password.value,
            username:username.value
        })
    });

    msg.innerText="Account created";
}

/* LOGIN */
async function login(){
    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            password:password.value,
            username:username.value
        })
    });

    const data = await res.json();
    if(data.user){
        user=data.user;
        msg.innerText="Logged in";
    } else {
        msg.innerText="Failed";
    }
}

/* POSTS */
async function loadPosts(){
    const res=await fetch("/api/posts");
    const data=await res.json();

    posts.innerHTML="";

    data.forEach(p=>{
        const div=document.createElement("div");
        div.className="post";

        div.innerHTML=`
        <b>${p.title}</b><br>
        by ${p.author}<br>
        <p>${p.content}</p>
        <button onclick="openPost(${p.id})">Expand</button>
        `;

        posts.appendChild(div);
    });
}

/* CREATE */
async function createPost(){
    await fetch("/api/posts",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:title.value,
            content:content.value,
            author:user?.username||author.value
        })
    });

    content.value="";
    loadPosts();
}

/* EXPAND */
async function openPost(id){
    const res=await fetch("/api/posts");
    const data=await res.json();
    const post=data.find(p=>p.id===id);

    full.innerText=post.title+"\n\n"+post.author+"\n\n"+post.content;
    full.style.display="block";
}

/* PANEL */
async function openPanel(){
    if(!user?.isAdmin){
        alert("Admin only");
        return;
    }

    const res=await fetch("/api/admin/dashboard");
    const data=await res.json();

    panelData.innerText=JSON.stringify(data,null,2);
    panel.style.display="block";
}

loadPosts();

</script>

</body>
</html>
