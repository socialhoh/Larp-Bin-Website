<script>

let user = null;

/* SHIFT + ENTER */
document.getElementById("content").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        createPost();
    }
});

/* LOGIN MODAL */
function openLogin() {
    loginModal.style.display = "flex";
}

function closeLogin() {
    loginModal.style.display = "none";
}

/* REGISTER */
async function register() {
    const res = await fetch("/api/register", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value,
            username: username.value
        })
    });

    const data = await res.json();
    msg.innerText = data.success ? "Account created!" : data.error;
}

/* LOGIN */
async function login() {
    const res = await fetch("/api/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value,
            username: username.value
        })
    });

    const data = await res.json();

    if (data.user) {
        user = data.user;
        msg.innerText = "Successfully logged in!";
    } else {
        msg.innerText = "Login failed";
    }
}

/* POSTS */
async function loadPosts() {
    const res = await fetch("/api/posts");
    const data = await res.json();

    const box = document.getElementById("posts");
    box.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.title}</b><br>
            <small>by ${p.author}</small><br>
            <p>${p.content.slice(0, 200)}...</p>
            <button onclick="openPost(${p.id})">Expand</button>
        `;

        box.appendChild(div);
    });
}

/* CREATE POST */
async function createPost() {
    await fetch("/api/posts", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            title: title.value,
            content: content.value,
            author: user?.username || author.value
        })
    });

    content.value = "";
    loadPosts();
}

/* FULLSCREEN POST */
async function openPost(id) {
    const res = await fetch("/api/posts");
    const posts = await res.json();
    const post = posts.find(p => p.id === id);

    full.innerText =
`${post.title}

by ${post.author}

${post.content}`;

    full.style.display = "block";
}

/* =========================
   🔐 ADMIN PANEL (FIXED)
   ========================= */

function openPanel() {
    if (!user?.isAdmin) {
        alert("Admin only");
        return;
    }

    panel.style.display = "block";
    loadAdmin();
}

async function loadAdmin() {
    const res = await fetch("/api/admin/dashboard");
    const data = await res.json();

    panelData.innerText =
        "USERS:\n" + JSON.stringify(data.users, null, 2) +
        "\n\nPOSTS:\n" + JSON.stringify(data.posts, null, 2);
}

/* AUTO LOAD */
loadPosts();

</script>
