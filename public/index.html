<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #111;
    color: white;
}

/* TOP BAR */
.topbar {
    background: #0b0b0b;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #222;
}

.topbar h2 {
    margin: 0;
}

.topbar button {
    background: #333;
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
}

/* CONTAINER */
.container {
    width: 80%;
    margin: auto;
    padding-top: 10px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    border: none;
    color: white;
}

button {
    background: #333;
    border: none;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
}

/* POSTS */
.post {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 10px;
}

.commentBtn {
    margin-top: 5px;
    cursor: pointer;
}

/* LOGIN MODAL */
.modal {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.modal input {
    width: 300px;
}

/* COMMENTS MODAL */
.commentModal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    padding:20px;
    overflow:auto;
    z-index:999;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h2>Larp Bin</h2>
    <button onclick="openLogin()">Login / Sign Up</button>
</div>

<div class="container">

<h3>Create Post</h3>

<input id="title" placeholder="title">
<input id="author" placeholder="author (optional)">
<textarea id="content" placeholder="Shift + Enter = new line"></textarea>

<button onclick="createPost()">Post</button>

<div id="posts"></div>

</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
    <h2>Login / Sign Up</h2>
    <input id="email" placeholder="email">
    <input id="password" type="password" placeholder="password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>

    <p id="loginMsg"></p>

    <button onclick="closeLogin()">Close</button>
</div>

<!-- COMMENTS MODAL -->
<div class="commentModal" id="commentModal">
    <h2>Comments</h2>
    <div id="commentList"></div>

    <input id="commentInput" placeholder="write comment">
    <button onclick="sendComment()">Send</button>

    <button onclick="closeComments()">Close</button>
</div>

<script>
let user = null;
let activePostId = null;

/* LOGIN UI */
function openLogin() {
    loginModal.style.display = "flex";
}

function closeLogin() {
    loginModal.style.display = "none";
}

/* LOGIN */
async function login() {
    const res = await fetch("/api/login", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.user) {
        user = data.user;
        loginMsg.innerText = "Successfully logged in!";
    }
}

/* REGISTER */
async function register() {
    await fetch("/api/register", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    loginMsg.innerText = "Account created!";
}

/* POSTS (UNCHANGED STYLE) */
async function loadPosts() {
    const res = await fetch("/api/posts");
    const data = await res.json();

    const box = document.getElementById("posts");
    box.innerHTML = "";

    data.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.title}</b><br>
            <small>${p.author}</small><br>
            <pre>${p.content}</pre>

            <div class="commentBtn" onclick="openComments(${p.id})">💬 Comments</div>
        `;

        box.appendChild(div);
    });
}

/* CREATE POST (UNCHANGED BEHAVIOR) */
async function createPost() {
    await fetch("/api/posts", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            title: title.value,
            author: author.value,
            content: content.value
        })
    });

    content.value = "";
    loadPosts();
}

/* COMMENTS */
async function openComments(id) {
    activePostId = id;

    const res = await fetch("/api/comments/" + id);
    const data = await res.json();

    commentList.innerHTML = "";

    data.forEach(c => {
        const div = document.createElement("div");
        div.innerText = `${c.user}: ${c.text}`;
        commentList.appendChild(div);
    });

    commentModal.style.display = "block";
}

function closeComments() {
    commentModal.style.display = "none";
}

/* SEND COMMENT */
async function sendComment() {
    await fetch("/api/comments", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
            postId: activePostId,
            text: commentInput.value,
            user: user?.email
        })
    });

    commentInput.value = "";
    openComments(activePostId);
}

loadPosts();
</script>

</body>
</html>
