<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
}

/* Top bar */
.topbar {
    background: #0b0b0b;
    border-bottom: 1px solid #222;
    text-align: center;
    padding: 10px;
}

.topbar h1 {
    margin: 0;
    font-size: 22px;
}

.topbar p {
    margin: 4px 0 0;
    font-size: 11px;
    color: #888;
}

/* Layout */
.container {
    width: 80%;
    margin: auto;
    padding-top: 15px;
}

input, textarea {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
    background: #222;
    border: none;
    color: white;
    box-sizing: border-box;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

button {
    padding: 8px 12px;
    background: #333;
    border: none;
    color: white;
    cursor: pointer;
}

/* Post box */
.post {
    background: #1a1a1a;
    margin: 10px 0;
    padding: 10px;
    cursor: pointer;
}

.post:hover {
    background: #222;
}

/* FULL SCREEN VIEW */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    overflow: auto;
    z-index: 999;
}

.modal-content {
    white-space: pre;
    overflow-x: auto;
    padding: 20px;
    min-width: 1000px;
}

.close {
    position: fixed;
    top: 10px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: white;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <h1>Larp Bin</h1>
    <p>Owner / Creator: pwned</p>
</div>

<div class="container">

<h2>Create Post</h2>

<input id="title" placeholder="Title">
<input id="author" placeholder="Author (optional)">
<textarea id="content" placeholder="Content (Shift + Enter = new line)"></textarea>

<button onclick="createPost()">Post</button>

<h2>Posts</h2>
<div id="posts"></div>

</div>

<!-- FULL SCREEN MODAL -->
<div class="modal" id="modal">
    <div class="close" onclick="closeModal()">×</div>
    <div class="modal-content" id="modalContent"></div>
</div>

<script>
const MAX_WORDS = 2000;

// Shift+Enter logic
document.getElementById("content").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        createPost();
    }
});

// word limit checker
function wordCount(text) {
    return text.trim().split(/\s+/).filter(Boolean).length;
}

async function loadPosts() {
    const res = await fetch('/api/posts');
    const data = await res.json();

    const container = document.getElementById('posts');
    container.innerHTML = '';

    data.forEach(post => {
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <h3>${post.title}</h3>
            <small>by ${post.author} | ${new Date(post.createdAt).toLocaleString()}</small>
            <p>${post.content.slice(0, 200)}...</p>
        `;

        div.onclick = () => openPost(post);
        container.appendChild(div);
    });
}

async function createPost() {
    const title = document.getElementById('title').value;
    const content = document.getElementById('content').value;
    const author = document.getElementById('author').value;

    if (wordCount(content) > MAX_WORDS) {
        alert("Max 2000 words allowed");
        return;
    }

    await fetch('/api/posts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, author })
    });

    document.getElementById('title').value = '';
    document.getElementById('content').value = '';
    document.getElementById('author').value = '';

    loadPosts();
}

// FULL SCREEN VIEW
function openPost(post) {
    document.getElementById("modalContent").textContent =
        post.title + "\n\n" +
        "by " + post.author + "\n" +
        new Date(post.createdAt).toLocaleString() + "\n\n" +
        post.content;

    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

async function deletePost(id) {
    await fetch('/api/posts/' + id, { method: 'DELETE' });
    loadPosts();
}

loadPosts();
</script>

</body>
</html>
