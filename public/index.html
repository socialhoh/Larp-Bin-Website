<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Larp Bin</title>

<style>
body { margin:0; font-family:Arial; background:#111; color:white; }

.topbar {
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#0b0b0b;
}

button {
    background:#333;
    color:white;
    border:none;
    padding:6px 10px;
    cursor:pointer;
}

.container {
    width:80%;
    margin:auto;
}

input, textarea {
    width:100%;
    padding:8px;
    margin:5px 0;
    background:#222;
    color:white;
    border:none;
}

.post {
    background:#1a1a1a;
    padding:10px;
    margin:10px 0;
}

.modal, .panel {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    padding:20px;
    overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>Larp Bin</h2>
    <div>
        <button onclick="openLogin()">Login / Sign Up</button>
        <button onclick="openPanel()">Panel</button>
    </div>
</div>

<div class="container">

<h2>POSTS</h2>

<input id="title" placeholder="title">
<input id="author" placeholder="display name">
<textarea id="content" placeholder="write post..."></textarea>

<button onclick="createPost()">Post</button>

<div id="posts"></div>

</div>

<!-- LOGIN -->
<div id="loginModal" class="modal">
    <h2>Login / Sign Up</h2>

    <label>Email</label>
    <input id="email">

    <label>Username</label>
    <input id="username">

    <label>Password</label>
    <input id="password" type="password">

    <button onclick="login()">Login</button>
    <button onclick="register()">Sign Up</button>

    <p id="msg"></p>

    <button onclick="loginModal.style.display='none'">Close</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
    <h2>Admin Panel</h2>
    <div id="panelData"></div>
    <button onclick="panel.style.display='none'">Close</button>
</div>

<script>

let user = null;

/* OPEN LOGIN */
function openLogin(){
    loginModal.style.display = "block";
}

/* REGISTER */
async function register(){
    const res = await fetch("/api/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            username:username.value,
            password:password.value
        })
    });

    const data = await res.json();
    msg.innerText = data.success ? "✅ Signed up!" : "❌ Failed";
}

/* LOGIN */
async function login(){
    const res = await fetch("/api/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            email:email.value,
            username:username.value,
            password:password.value
        })
    });

    const data = await res.json();

    if(data.error){
        msg.innerText = "❌ Login failed";
        return;
    }

    user = data.user;
    msg.innerText = "✅ Logged in as " + user.username;
}

/* LOAD POSTS */
async function loadPosts(){
    const res = await fetch("/api/posts");
    const data = await res.json();

    posts.innerHTML = "";

    data.forEach(p=>{
        const div = document.createElement("div");
        div.className = "post";

        div.innerHTML = `
            <b>${p.title}</b><br>
            ${p.author} ${p.authorVerified ? "✔️ Verified" : ""}<br><br>
            ${p.content}
        `;

        if(user?.isAdmin){
            div.innerHTML += `
                <br><button onclick="deletePost('${p._id}')">Delete</button>
            `;
        }

        posts.appendChild(div);
    });
}

/* CREATE POST */
async function createPost(){
    await fetch("/api/posts",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            title:title.value,
            content:content.value,
            author:author.value
        })
    });

    loadPosts();
}

/* DELETE POST */
async function deletePost(id){
    await fetch("/api/admin/post/"+id,{
        method:"DELETE"
    });

    loadPosts();
}

/* PANEL */
async function openPanel(){
    if(!user?.isAdmin){
        alert("Admin only");
        return;
    }

    panel.style.display = "block";

    const res = await fetch("/api/admin/dashboard");
    const data = await res.json();

    panelData.innerHTML = `
        <h3>Users</h3>
        ${data.users.map(u =>
            `${u.username} ${u.verified ? "✔️ Verified" : ""}<br>`
        ).join("")}

        <h3>Posts</h3>
        ${data.posts.map(p =>
            `${p.title} - ${p.author}<br>`
        ).join("")}
    `;
}

loadPosts();

</script>

</body>
</html>
