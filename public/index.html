<!DOCTYPE html>
<html>
<head>
<title>LARP BIN</title>

<style>
body {
  margin:0;
  background:#0d0d0d;
  color:#e5e5e5;
  font-family:Arial;
}

/* HEADER */
.header {
  background:#111;
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #222;
}

.logo {
  font-size:20px;
  font-weight:bold;
  color:#00ffcc;
}

/* MAIN */
.container {
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f0f0f;
  border-right:1px solid #222;
  padding:15px;
}

.sidebar button {
  width:100%;
  margin-bottom:10px;
  background:#111;
  border:1px solid #333;
  color:white;
  padding:10px;
  cursor:pointer;
}

.sidebar button:hover {
  background:#1a1a1a;
}

/* CONTENT */
.content {
  flex:1;
  padding:20px;
}

/* POSTS */
.post {
  background:#111;
  padding:15px;
  margin-bottom:15px;
  border:1px solid #222;
}

.post-title {
  font-size:18px;
  color:#00ffcc;
}

.post-user {
  font-size:12px;
  color:#aaa;
  cursor:pointer;
}

/* CREATE */
.create {
  background:#111;
  padding:15px;
  margin-bottom:20px;
  border:1px solid #222;
}

/* INPUTS */
input, textarea {
  width:100%;
  background:#0d0d0d;
  border:1px solid #333;
  color:white;
  padding:8px;
  margin-bottom:10px;
}

button {
  background:#00ffcc;
  border:none;
  padding:10px;
  cursor:pointer;
}

button:hover {
  opacity:0.8;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">LARP BIN</div>

  <div>
    <input id="searchBox" placeholder="Search posts or users">
    <button onclick="search()">Search</button>
    <button onclick="codeLogin()">Owner Login</button>
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="loadPosts()">📄 All Posts</button>
    <button onclick="showCreate()">➕ Create Post</button>
    <button onclick="loadAnn()">📢 Announcements</button>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- CREATE -->
    <div id="createBox" class="create" style="display:none;">
      <h3>Create Post</h3>

      <input id="title" placeholder="Title">
      <textarea id="t1" placeholder="Text 1"></textarea>
      <textarea id="t2" placeholder="Text 2"></textarea>
      <textarea id="t3" placeholder="Text 3"></textarea>
      <input id="img" placeholder="Image URL">

      <button onclick="createPost()">Post</button>
    </div>

    <!-- POSTS -->
    <div id="posts"></div>

  </div>

</div>

<script>
let user = "guest";
let role = "user";

/* OWNER LOGIN */
async function codeLogin(){
  let r = await fetch("/api/code-login",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({code:prompt("Enter code")})
  });

  let d = await r.json();
  if(d.error) return alert("bad code");

  user = d.username;
  role = d.role;

  alert("Logged in as OWNER");
}

/* SHOW CREATE */
function showCreate(){
  createBox.style.display="block";
}

/* CREATE POST */
async function createPost(){
  await fetch("/api/post",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:user,
      title:title.value,
      text1:t1.value,
      text2:t2.value,
      text3:t3.value,
      img:img.value
    })
  });

  loadPosts();
}

/* LOAD POSTS */
async function loadPosts(){
  let r = await fetch("/api/posts");
  let d = await r.json();

  posts.innerHTML="";

  d.forEach(p=>{
    posts.innerHTML += `
      <div class="post">
        <div class="post-title">${p.title}</div>
        <div class="post-user" onclick="profile('${p.username}')">
          by ${p.username}
        </div>

        <p>${p.text1}</p>
        <p>${p.text2}</p>
        <p>${p.text3}</p>

        ${p.img ? `<img src="${p.img}" width="200">` : ""}
      </div>
    `;
  });
}

/* SEARCH */
async function search(){
  let r = await fetch("/api/search?q="+searchBox.value);
  let d = await r.json();

  posts.innerHTML="";
  d.forEach(p=>{
    posts.innerHTML += `
      <div class="post">
        <div class="post-title">${p.title}</div>
        <div class="post-user">${p.username}</div>
      </div>
    `;
  });
}

/* PROFILE */
function profile(name){
  if(role === "owner"){
    if(confirm("Make staff?")){
      fetch("/api/staff",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({user:name})
      });
    }
  }

  let newName = prompt("Change name?");
  let pfp = prompt("PFP URL?");

  fetch("/api/profile",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      old:name,
      new:newName,
      pfp
    })
  });
}

/* ANNOUNCEMENTS */
async function loadAnn(){
  let r = await fetch("/api/announce");
  let d = await r.json();

  posts.innerHTML="";
  d.forEach(a=>{
    posts.innerHTML += `
      <div class="post">
        <b>Announcement</b><br>
        ${a.text}<br>
        ${a.img ? `<img src="${a.img}" width="200">` : ""}
      </div>
    `;
  });
}

/* INIT */
loadPosts();
</script>

</body>
</html>
